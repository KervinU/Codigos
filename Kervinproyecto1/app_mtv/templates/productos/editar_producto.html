<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar producto</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0}
        .box{
            max-width:600px;margin:50px auto;background:white;padding:30px;
            border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,.08)
        }
        input, textarea{
            width:100%;padding:12px;margin-top:8px;margin-bottom:18px;
            border:1px solid #ccc;border-radius:10px
        }
        button, a{
            display:inline-block;padding:10px 16px;border-radius:10px;
            text-decoration:none;border:none;cursor:pointer;font-weight:bold
        }
        button{background:#2563eb;color:white}
        a{background:#64748b;color:white}
    </style>
</head>
<body>
    <div class="box">
        <h1>Editar producto</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Actualizar</button>
            <a href="{% url 'inicio' %}">Volver</a>
        </form>
    </div>
</body>
</html>
