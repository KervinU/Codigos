{% extends 'productos/base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<section class="py-5">
    <div class="form-shell">
        <p class="hero-kicker">Gestión de catálogo</p>
        <h1 class="brand-serif display-5 mb-4">{{ titulo }}</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-luxury">{{ boton }}</button>
                <a href="{% url 'inicio' %}" class="btn btn-outline-luxury">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
