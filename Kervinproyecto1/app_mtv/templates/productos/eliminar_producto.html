{% extends 'productos/base.html' %}
{% block title %}Eliminar producto{% endblock %}

{% block content %}
<section class="py-5">
    <div class="form-shell text-center">
        <p class="hero-kicker">Gestión de catálogo</p>
        <h1 class="brand-serif display-5 mb-3">Eliminar pieza</h1>
        <p class="text-muted mb-4">¿Seguro que quieres eliminar <strong>{{ producto.nombre }}</strong> del catálogo?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-luxury">Sí, eliminar</button>
            <a href="{% url 'inicio' %}" class="btn btn-outline-luxury">Cancelar</a>
        </form>
    </div>
</section>
{% endblock %}
